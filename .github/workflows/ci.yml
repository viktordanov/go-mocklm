# CI gate: the spec-sync drift tripwire must actually RUN, not skip.
#
# The sha256-pinned OpenAPI specs the vendored validator closure was
# extracted from are vendored in-repo under testdata/nanollm-spec, so CI is
# fully self-contained — no cross-repo checkout of the (private) nanollm
# repo. MOCKLM_REQUIRE_SPEC_SYNC=1 turns the missing-spec-dir skip in
# spec_sync_test.go into a hard failure, so a green run cannot silently mean
# "the drift tests did not execute". MOCKLM_VALIDATE_RESPONSES=1 turns on the
# response self-validation closed loop for every test request.
#
# The suite runs under -race: the concurrent scenario-replacement and
# per-scenario counter tests are only meaningful with the race detector on,
# so the race gate is enforced here, not promised in a comment.
#
# To check for live drift against a nanollm checkout, run locally with
# NANOLLM_SPEC_DIR=../nanollm/spec (see scripts/refresh-specs.sh).
name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...
      - name: go test -race (spec-sync gate + response self-validation on)
        env:
          MOCKLM_REQUIRE_SPEC_SYNC: "1"
          MOCKLM_VALIDATE_RESPONSES: "1"
        run: go test -race ./...
